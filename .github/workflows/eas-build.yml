name: Local EAS Build (Android)
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
      - dev
  workflow_dispatch:

jobs:
  build:
    name: Build Android Development APKs Locally
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20.x

      - name: Setup Expo and EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Inject Mobile Config Files
        run: |
          echo '${{ secrets.MOBILE_GOOGLE_SERVICES }}' > ./mobile/google-services.json
          echo '${{ secrets.MOBILE_FIREBASE_SDK }}' > ./mobile/same-it-60221-firebase-adminsdk-fbsvc-864a487c23.json
          sed -i '/google-services.json/d' ./mobile/.gitignore
          sed -i '/firebase-adminsdk/d' ./mobile/.gitignore
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add ./mobile/google-services.json ./mobile/same-it-60221-firebase-adminsdk-fbsvc-864a487c23.json ./mobile/.gitignore
          git commit -m "Inject mobile secrets" || echo "Nothing to commit"
          
          # Verify files exist and are tracked before building
          echo "Verifying mobile config files..."
          ls -la ./mobile/google-services.json
          ls -la ./mobile/same-it-60221-firebase-adminsdk-fbsvc-864a487c23.json
          git ls-files --error-unmatch ./mobile/google-services.json

      - name: Build Mobile App (Android - Dev)
        run: |
          yarn install
          eas build -p android --profile development --local --non-interactive --output build-mobile-dev.apk
        working-directory: ./mobile
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Upload Mobile APK
        uses: actions/upload-artifact@v4
        with:
          name: mobile-dev-apk
          path: mobile/build-mobile-dev.apk

      - name: Inject Admin Config Files
        run: |
          echo '${{ secrets.ADMIN_GOOGLE_SERVICES }}' > ./admin/google-services.json
          echo '${{ secrets.ADMIN_FIREBASE_SDK }}' > ./admin/same-it-admin-firebase-adminsdk-fbsvc-0729e3a855.json
          sed -i '/google-services.json/d' ./admin/.gitignore
          sed -i '/firebase-adminsdk/d' ./admin/.gitignore
          git add ./admin/google-services.json ./admin/same-it-admin-firebase-adminsdk-fbsvc-0729e3a855.json ./admin/.gitignore
          git commit -m "Inject admin secrets" || echo "Nothing to commit"
          
          # Verify files exist and are tracked before building
          echo "Verifying admin config files..."
          ls -la ./admin/google-services.json
          ls -la ./admin/same-it-admin-firebase-adminsdk-fbsvc-0729e3a855.json
          git ls-files --error-unmatch ./admin/google-services.json

      - name: Build Admin App (Android - Dev)
        run: |
          yarn install
          eas build -p android --profile development --local --non-interactive --output build-admin-dev.apk
        working-directory: ./admin
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Upload Admin DEV APK
        uses: actions/upload-artifact@v4
        with:
          name: admin-dev-apk
          path: admin/build-admin-dev.apk
