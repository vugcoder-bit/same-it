name: EAS Build (Android)
on:
  push:
    branches:
      - main
      - dev
  workflow_dispatch:

jobs:
  build:
    name: Build Android APKs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20.x

      - name: Setup Expo and EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build Mobile App (Android APK)
        run: |
          yarn install
          eas build -p android --profile development --local --non-interactive --output build-mobile.apk
        working-directory: ./mobile
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Upload Mobile APK
        uses: actions/upload-artifact@v4
        with:
          name: mobile-apk
          path: mobile/build-mobile.apk

      - name: Build Admin App (Android APK)
        run: |
          yarn install
          eas build -p android --profile development --local --non-interactive --output build-admin.apk
        working-directory: ./admin
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Upload Admin APK
        uses: actions/upload-artifact@v4
        with:
          name: admin-apk
          path: admin/build-admin.apk
